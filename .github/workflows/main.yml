# Name of the workflow
name: ETL pipeline

on:
  push:
    branch:
      - main

jobs:
  job1:
    runs-on: ubuntu latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Show job content
        run: echo "Job 1 content"

  job2:
    runs-on: ubuntu latest
    needs: job1
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Show job content
        run: "Job 2 content"

  job3:
    runs-on: ubuntu latest
    needs: job1
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Show job content
        run: "Job 3 content"

  job4:
    runs-on: ubuntu latest
    needs: job2
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Show job content
        run: "Job 4 content"

  job5:
    runs-on: ubuntu latest
    needs: job3
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Show job content
        run: "Job 5 content"

  job6:
    runs-on: ubuntu latest
    needs: job4
    needs: job5
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Show job content
        run: "Job 6 content"
